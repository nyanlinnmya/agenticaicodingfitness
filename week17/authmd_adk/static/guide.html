<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>auth.md × ADK — interactive tutorial guide</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2330; --line:#2b3440;
    --txt:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --green:#3fb950;
    --amber:#d29922; --red:#f85149; --violet:#bc8cff; --term:#0a0d12;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
  /* top bar */
  header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);
         background:var(--panel);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:650}
  header .sub{color:var(--dim);font-size:12px}
  .grow{flex:1}
  .pill{font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim);
        display:inline-flex;align-items:center;gap:6px}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:background .3s}
  .pill.up .dot{background:var(--green)} .pill.down .dot{background:var(--red)}
  .pill button{margin-left:6px;font-size:10px;padding:1px 7px;border-radius:6px;border:1px solid var(--line);
               background:transparent;color:var(--txt);cursor:pointer}
  .pill button:hover{border-color:var(--accent)}
  .tbtn{font:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;
        border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .tbtn:hover{border-color:var(--accent)} .tbtn.danger:hover{border-color:var(--red);color:var(--red)}
  /* progress */
  .progress{height:3px;background:var(--panel2)}
  .progress > div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s}
  /* layout */
  .main{flex:1;display:grid;grid-template-columns:330px 1fr;min-height:0}
  @media(max-width:900px){.main{grid-template-columns:1fr}}
  /* sidebar */
  .side{border-right:1px solid var(--line);overflow:auto;background:var(--panel);padding:8px 0}
  .grp{padding:14px 18px 6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600}
  .step{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent}
  .step:hover{background:var(--panel2)}
  .step.sel{background:var(--panel2);border-left-color:var(--accent)}
  .step .ico{flex:0 0 18px;text-align:center;font-size:13px}
  .step .t{font-size:13px;flex:1}
  .step.done .t{color:var(--green)} .step.fail .t{color:var(--red)}
  .sp{width:11px;height:11px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
      display:inline-block;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  /* content */
  .content{overflow:auto;padding:24px 28px;min-width:0}
  .crumb{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  .content h2{font-size:20px;margin:6px 0 10px}
  .desc{color:#c9d1d9;max-width:760px;margin-bottom:16px}
  .cmd{background:var(--term);border:1px solid var(--line);border-radius:8px;padding:10px 12px;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#9ad1ff;
       white-space:pre-wrap;word-break:break-all;margin-bottom:14px}
  .cmd .lbl{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
  .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .run{font:inherit;font-size:14px;font-weight:650;padding:11px 20px;border-radius:9px;cursor:pointer;
       border:1px solid var(--accent);background:rgba(88,166,255,.16);color:var(--txt)}
  .run:hover:not(:disabled){background:rgba(88,166,255,.28)}
  .run:disabled{opacity:.45;cursor:not-allowed}
  .run.go{border-color:var(--green);background:rgba(63,185,80,.16)}
  .run.stop{border-color:var(--amber);background:rgba(210,153,34,.14)}
  .run.danger{border-color:var(--red);background:rgba(248,81,73,.12)}
  .req{font-size:12px;color:var(--amber)}
  .req.ok{color:var(--green)}
  /* terminal */
  .term-wrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--term)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#11161f;border-bottom:1px solid var(--line);
            font-size:11px;color:var(--dim)}
  .term-bar .d{width:11px;height:11px;border-radius:50%}
  .term-bar .clr{margin-left:auto;cursor:pointer}
  .term{padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;
        white-space:pre-wrap;word-break:break-word;min-height:140px;max-height:50vh;overflow:auto;color:#d6dee8}
  .term .ok{color:var(--green)} .term .bad{color:var(--red)}
  .footer{padding:8px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--dim);display:none}
  .footer.show{display:block}
  .footer .pass{color:var(--green)} .footer .failc{color:var(--red)}
  .hintbar{font-size:12px;color:var(--dim);margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  a.link{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>🧭 auth.md × ADK</h1>
  <span class="sub">interactive guide — Steps 0–15 + cleanup</span>
  <span class="grow"></span>
  <span class="pill" id="pill-app"><span class="dot"></span>app :8088<button onclick="srv('app',ev())">start</button></span>
  <span class="pill" id="pill-agent"><span class="dot"></span>agent :8089<button onclick="srv('agent',ev())">start</button></span>
  <button class="tbtn" onclick="cleanFiles()">🧹 Clean files</button>
  <button class="tbtn danger" onclick="demolish()">💥 Start over</button>
</header>
<div class="progress"><div id="bar"></div></div>

<div class="main">
  <nav class="side" id="side"></nav>
  <section class="content" id="content"></section>
</div>

<script>
let STEPS=[], SERVERS={}, sel=null;
const status={};            // step_id -> idle|running|pass|fail
const ICON={idle:"○",running:'<span class="sp"></span>',pass:"✓",fail:"✕"};

function ev(){ event.stopPropagation(); return true; }

async function jget(u){ const r=await fetch(u); return r.json(); }
async function jpost(u,b){ const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify(b||{})}); return r.json(); }

// ── sidebar ────────────────────────────────────────────────────────────────
function renderSide(){
  const el=document.getElementById("side"); el.innerHTML="";
  let lastGrp=null;
  STEPS.forEach(s=>{
    if(s.group!==lastGrp){ const g=document.createElement("div"); g.className="grp"; g.textContent=s.group; el.appendChild(g); lastGrp=s.group; }
    const d=document.createElement("div"); d.className="step"+(sel===s.id?" sel":"")+
      (status[s.id]==="pass"?" done":status[s.id]==="fail"?" fail":"");
    d.onclick=()=>select(s.id);
    let ico = ICON[status[s.id]||"idle"];
    if(s.kind==="server"){ const sv=SERVERS[s.target]; ico = sv?.healthy?"🟢":sv?.running?"🟡":"⚪"; }
    if(s.kind==="link") ico="↗"; if(s.kind==="demolish") ico="💥";
    d.innerHTML=`<span class="ico">${ico}</span><span class="t">${s.title}</span>`;
    el.appendChild(d);
  });
  const runnable=STEPS.filter(s=>s.kind==="run");
  const done=runnable.filter(s=>status[s.id]==="pass").length;
  document.getElementById("bar").style.width=(runnable.length?100*done/runnable.length:0)+"%";
}

// ── main panel ───────────────────────────────────────────────────────────────
function select(id){ sel=id; renderSide(); renderContent(); }

function renderContent(){
  const s=STEPS.find(x=>x.id===sel); const c=document.getElementById("content");
  if(!s){ c.innerHTML='<p class="desc">Select a step from the left to begin.</p>'; return; }
  let cmdHtml = s.command ? `<div class="cmd"><span class="lbl">command</span>${esc(s.command)}</div>` : "";
  let req="";
  if((s.requires||[]).length){
    const ok=s.requires.every(r=>SERVERS[r]?.healthy);
    req=`<span class="req ${ok?'ok':''}">${ok?'✓':'⚠'} needs: ${s.requires.join(" + ")} server${ok?' (running)':' — start it first'}</span>`;
  }
  let action="";
  if(s.kind==="run"){
    action=`<button class="run" id="runbtn" onclick="runStep('${s.id}')">▶ Run step</button>${req}`;
  } else if(s.kind==="server"){
    const sv=SERVERS[s.target]||{}; const up=sv.healthy;
    action=`<button class="run ${up?'stop':'go'}" onclick="srv('${s.target}','${up?'stop':(s.action==='restart'?'restart':'start')}')">`+
           `${up?'■ Stop '+s.target+' server':(s.action==='restart'?'↻ Restart '+s.target+' server':'● Start '+s.target+' server')}</button>`+
           `<span class="req ${up?'ok':''}">${up?'🟢 running & healthy':'⚪ not running'}</span>`;
  } else if(s.kind==="link"){
    action=`<button class="run" onclick="window.open('${s.href}','_blank')">↗ Open visualizer</button>`+
           `<span class="req">opens the agent server UI in a new tab</span>`;
  } else if(s.kind==="demolish"){
    action=`<button class="run danger" onclick="demolish()">💥 Demolish — stop servers + clean files</button>`;
  }
  const showTerm = (s.kind==="run"||s.kind==="server"||s.kind==="demolish");
  let logsBtn = (s.kind==="server"||(s.requires||[]).length)
     ? `<button class="tbtn" style="margin-left:8px" onclick="showLogs('${s.target||s.requires?.[s.requires.length-1]||'agent'}')">view server log</button>` : "";
  c.innerHTML=`
    <div class="crumb">${s.group}</div>
    <h2>${s.title}</h2>
    <div class="desc">${s.desc}</div>
    ${cmdHtml}
    <div class="actions">${action}${logsBtn}</div>
    ${showTerm?`<div class="term-wrap">
      <div class="term-bar"><span class="d" style="background:#f85149"></span>
        <span class="d" style="background:#d29922"></span><span class="d" style="background:#3fb950"></span>
        <span style="margin-left:8px">output</span><span class="clr" onclick="clearTerm()">clear</span></div>
      <div class="term" id="term">${termCache[s.id]||'<span style="color:#586069">— click the button above to run —</span>'}</div>
      <div class="footer" id="footer"></div>
    </div>`:""}
    <div class="hintbar">Tip: every command is shown above in full — copy it into a terminal to run it by hand. Slow Part 2 steps call the LLM and stream output live (~1 min).</div>`;
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── terminal + streaming run ─────────────────────────────────────────────────
const termCache={};
function clearTerm(){ if(sel) termCache[sel]=""; const t=document.getElementById("term"); if(t)t.innerHTML="";
  const f=document.getElementById("footer"); if(f)f.classList.remove("show"); }
function writeTerm(html){ const t=document.getElementById("term"); if(!t)return;
  t.innerHTML=html; t.scrollTop=t.scrollHeight; }

async function runStep(id){
  status[id]="running"; renderSide();
  const btn=document.getElementById("runbtn"); if(btn){btn.disabled=true;}
  const f=document.getElementById("footer"); if(f)f.classList.remove("show");
  let text=""; termCache[id]="";
  try{
    const resp=await fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({step_id:id})});
    const reader=resp.body.getReader(); const dec=new TextDecoder();
    let exitCode=null, dur=null;
    while(true){
      const {done,value}=await reader.read(); if(done)break;
      text+=dec.decode(value,{stream:true});
      const m=text.indexOf("__EXIT__");
      let display = m>=0 ? text.slice(0,m) : text;
      if(m>=0){ const rest=text.slice(m).match(/__EXIT__ (\-?\d+) ([\d.]+)/);
        if(rest){ exitCode=parseInt(rest[1]); dur=rest[2]; } }
      termCache[id]=esc(display);
      if(sel===id) writeTerm(esc(display));
    }
    if(exitCode!==null){
      status[id]= exitCode===0?"pass":"fail";
      if(sel===id && f){ f.classList.add("show");
        f.innerHTML = exitCode===0
          ? `<span class="pass">✓ exit 0</span> · ${dur}s`
          : `<span class="failc">✕ exit ${exitCode}</span> · ${dur}s — see output above`; }
    } else { status[id]="pass"; }
  }catch(e){ status[id]="fail"; termCache[id]=esc("client error: "+e.message); if(sel===id)writeTerm(termCache[id]); }
  if(btn)btn.disabled=false;
  await refreshServers(); renderSide(); if(sel===id)renderContent();
}

// ── server management ────────────────────────────────────────────────────────
async function srv(target, action){
  if(action===true) action="start";   // from the inline pill button
  const f=()=>{};
  setTermMsg(`▶ ${action} ${target} …`);
  const r=await jpost("/api/server",{target,action});
  SERVERS=r.servers; renderSide(); renderContent();
  setTermMsg((r.messages||[]).join("\n"));
  refreshServers();
}
function setTermMsg(msg){ if(sel){termCache[sel]=esc(msg);} const t=document.getElementById("term"); if(t)writeTerm(esc(msg)); }

async function showLogs(which){
  const r=await jget("/api/logs/"+which+"?n=80");
  termCache[sel]=esc(`── ${which} server log (tail) ──\n`+r.log);
  const t=document.getElementById("term"); if(t)writeTerm(termCache[sel]);
}

async function cleanFiles(){
  const r=await jpost("/api/cleanup",{});
  SERVERS=r.servers; renderSide();
  if(sel)renderContent();
  setTermMsg((r.messages||[]).join("\n"));
}
async function demolish(){
  if(!confirm("Stop both servers and delete all generated files (SQLite session + signing key)?")) return;
  // reset step statuses
  STEPS.forEach(s=>{ if(s.kind==="run") status[s.id]="idle"; });
  await cleanFiles();
}

async function refreshServers(){
  try{ SERVERS=await jget("/api/servers"); }catch{ SERVERS={}; }
  const set=(id,sv)=>{ const p=document.getElementById(id);
    p.classList.toggle("up",!!sv?.healthy); p.classList.toggle("down",!sv?.healthy);
    const b=p.querySelector("button"); if(b)b.textContent=sv?.healthy?"stop":"start";
    if(b)b.onclick=(e)=>{e.stopPropagation();srv(id.replace("pill-",""),sv?.healthy?"stop":"start");}; };
  set("pill-app",SERVERS.app); set("pill-agent",SERVERS.agent);
  renderSide();
}

// ── boot ─────────────────────────────────────────────────────────────────────
async function boot(){
  const r=await jget("/api/steps"); STEPS=r.steps;
  STEPS.forEach(s=>status[s.id]="idle");
  await refreshServers();
  sel=STEPS[0].id; renderSide(); renderContent();
  setInterval(refreshServers,4000);
}
boot();
</script>
</body>
</html>
