# Smart Hotel MAS — Production compose. (smart_hotel_mas.pdf §"Production Deployment")
#
# Self-hosted stack: Neo4j (L4) + ChromaDB (L3) + Redis (L1/L2 cache + queues)
# + the FastAPI app. For a lower-ops footprint, swap the stateful services for
# managed clouds (see the commented MANAGED ALTERNATIVE notes on each service).
#
# Bring up:   ANTHROPIC_API_KEY=sk-ant-... docker compose -f docker-compose.prod.yml up -d
# Cost note:  self-hosted ~$200–250/month on a small VM + Anthropic API usage.

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: hotel-neo4j-prod
    # MANAGED ALTERNATIVE: Neo4j Aura (https://neo4j.com/aura) — no container,
    # point NEO4J_URI at neo4j+s://<id>.databases.neo4j.io and drop this block.
    environment:
      - NEO4J_AUTH=neo4j/hotel_mas_2024
      - NEO4J_server_memory_heap_max__size=1G
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: hotel-chroma-prod
    # MANAGED ALTERNATIVE: Chroma Cloud (https://www.trychroma.com/cloud) —
    # set CHROMA_HOST to the managed endpoint and drop this block.
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hotel-redis-prod
    # MANAGED ALTERNATIVE: Upstash / Redis Cloud for serverless persistence.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    # Build context is the workshop root so the image can copy config.py +
    # checkpoints/ + production/. Provide a Dockerfile at the build context root.
    build:
      context: ..
      dockerfile: production/api/Dockerfile
    image: smart-hotel-mas-api:latest
    container_name: hotel-api-prod
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /app/production/api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=hotel_mas_2024
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - HOTEL_MAS_MODEL=claude-sonnet-4-6
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  neo4j_data:
  chroma_data:
  redis_data:
