# docker-compose.yml (save and run: docker-compose up -d)
version: "3.8"
services:
  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/mas_memory_2024
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
volumes:
  neo4j_data: