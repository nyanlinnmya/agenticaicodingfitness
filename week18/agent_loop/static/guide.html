<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Loop — interactive tutorial (Claude Agent SDK)</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2330; --line:#2b3440;
    --txt:#e6edf3; --dim:#8b949e; --accent:#58a6ff; --green:#3fb950;
    --amber:#d29922; --red:#f85149; --violet:#bc8cff; --cyan:#56d4dd; --term:#0a0d12;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);
         background:var(--panel);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:650} header .sub{color:var(--dim);font-size:12px}
  .grow{flex:1}
  .pill{font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim);
        display:inline-flex;align-items:center;gap:6px}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .pill.up .dot{background:var(--green)} .pill.down .dot{background:var(--red)}
  .tbtn{font:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;
        border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .tbtn:hover{border-color:var(--accent)} .tbtn.danger:hover{border-color:var(--red);color:var(--red)}
  .progress{height:3px;background:var(--panel2)}
  .progress > div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s}
  .main{flex:1;display:grid;grid-template-columns:320px 1fr;min-height:0}
  @media(max-width:900px){.main{grid-template-columns:1fr}}
  .side{border-right:1px solid var(--line);overflow:auto;background:var(--panel);padding:8px 0}
  .grp{padding:14px 18px 6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);font-weight:600}
  .step{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent}
  .step:hover{background:var(--panel2)} .step.sel{background:var(--panel2);border-left-color:var(--accent)}
  .step .ico{flex:0 0 18px;text-align:center;font-size:13px}
  .step .t{font-size:13px;flex:1} .step.done .t{color:var(--green)} .step.fail .t{color:var(--red)}
  .sp{width:11px;height:11px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
      display:inline-block;animation:rot .7s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .content{overflow:auto;padding:24px 28px;min-width:0}
  .crumb{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
  .content h2{font-size:21px;margin:6px 0 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .lv{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:6px}
  .lv.beginner{background:rgba(63,185,80,.16);color:var(--green)}
  .lv.intermediate{background:rgba(88,166,255,.16);color:var(--accent)}
  .lv.advanced{background:rgba(188,140,255,.16);color:var(--violet)}
  .lv.all{background:rgba(210,153,34,.16);color:var(--amber)}
  .desc{color:#c9d1d9;max-width:820px;margin-bottom:16px;white-space:pre-wrap}
  .srcwrap{margin-bottom:16px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .srctog{cursor:pointer;padding:8px 12px;background:var(--panel2);font-size:12px;color:var(--accent);
          display:flex;align-items:center;gap:8px;user-select:none}
  .srctog:hover{color:#9ad1ff}
  pre.src{margin:0;max-height:0;overflow:auto;transition:max-height .25s;background:var(--term);
          font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:#c9d1d9;padding:0 14px}
  pre.src.open{max-height:420px;padding:12px 14px}
  .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .run{font:inherit;font-size:14px;font-weight:650;padding:11px 20px;border-radius:9px;cursor:pointer;
       border:1px solid var(--green);background:rgba(63,185,80,.16);color:var(--txt)}
  .run:hover:not(:disabled){background:rgba(63,185,80,.28)} .run:disabled{opacity:.45;cursor:not-allowed}
  .note{font-size:12px;color:var(--amber)}
  .term-wrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--term)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#11161f;border-bottom:1px solid var(--line);
            font-size:11px;color:var(--dim)}
  .term-bar .d{width:11px;height:11px;border-radius:50%} .term-bar .clr{margin-left:auto;cursor:pointer}
  .term{padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;
        white-space:pre-wrap;word-break:break-word;min-height:160px;max-height:56vh;overflow:auto;color:#d6dee8}
  .footer{padding:8px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--dim);display:none}
  .footer.show{display:block} .footer .pass{color:var(--green)} .footer .failc{color:var(--red)}
  .hintbar{font-size:12px;color:var(--dim);margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  /* loop-line colors */
  .l-session{color:var(--cyan);font-weight:600}
  .l-reason{color:var(--dim)}
  .l-think{color:#7d8590;font-style:italic}
  .l-act{color:var(--amber);font-weight:600}
  .l-observe{color:var(--green)}
  .l-result{color:var(--violet);font-weight:600}
  .l-hook{color:var(--red);font-weight:600}
  .l-banner{color:var(--accent)}
  /* loop diagram */
  .loopdiag{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:6px 0 20px;padding:16px;
            background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .node{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(--line)}
  .node.s{background:rgba(86,212,221,.14);color:var(--cyan);border-color:rgba(86,212,221,.4)}
  .node.r{background:rgba(139,148,158,.14);color:#c9d1d9}
  .node.a{background:rgba(210,153,34,.14);color:var(--amber);border-color:rgba(210,153,34,.4)}
  .node.o{background:rgba(63,185,80,.14);color:var(--green);border-color:rgba(63,185,80,.4)}
  .node.f{background:rgba(188,140,255,.14);color:var(--violet);border-color:rgba(188,140,255,.4)}
  .arrow{color:var(--dim);font-size:16px}
  .loopback{color:var(--accent);font-size:11px;font-style:italic}
</style>
</head>
<body>
<header>
  <h1>🔁 Agent Loop</h1>
  <span class="sub">interactive, explainable tutorial — Claude Agent SDK · real loops, live</span>
  <span class="grow"></span>
  <span class="pill" id="pill-cli"><span class="dot"></span><span id="cli-txt">checking CLI…</span></span>
  <button class="tbtn" onclick="cleanFiles()">🧹 Clean sandbox</button>
</header>
<div class="progress"><div id="bar"></div></div>

<div class="main">
  <nav class="side" id="side"></nav>
  <section class="content" id="content"></section>
</div>

<script>
let STEPS=[], sel=null, CLI=false;
const status={}, termCache={}, srcCache={};
const ICON={idle:"○",running:'<span class="sp"></span>',pass:"✓",fail:"✕"};

async function jget(u){ return (await fetch(u)).json(); }
async function jpost(u,b){ return (await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify(b||{})})).json(); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// colorize the loopview narration so the loop is readable at a glance
function colorize(text){
  return esc(text).split("\n").map(line=>{
    const t=line.trimStart();
    if(t.startsWith("● SESSION")||t.startsWith("[SystemMessage")) return `<span class="l-session">${line}</span>`;
    if(t.startsWith("→ ACT")||t.startsWith("[AssistantMessage]     turn")) return `<span class="l-act">${line}</span>`;
    if(t.startsWith("← OBSERVE")||t.startsWith("[UserMessage]")) return `<span class="l-observe">${line}</span>`;
    if(t.startsWith("~ REASON")) return `<span class="l-think">${line}</span>`;
    if(t.startsWith("· REASON")||t.startsWith("[AssistantMessage]     text")) return `<span class="l-reason">${line}</span>`;
    if(t.startsWith("═")||t.startsWith("[ResultMessage]")) return `<span class="l-result">${line}</span>`;
    if(t.startsWith("🛡")) return `<span class="l-hook">${line}</span>`;
    if(t.startsWith("━")||t.startsWith("┌─")||t.startsWith("│")||t.startsWith("└")) return `<span class="l-banner">${line}</span>`;
    return line;
  }).join("\n");
}

function renderSide(){
  const el=document.getElementById("side"); el.innerHTML=""; let last=null;
  STEPS.forEach(s=>{
    if(s.group!==last){ const g=document.createElement("div");g.className="grp";g.textContent=s.group;el.appendChild(g);last=s.group; }
    const d=document.createElement("div");
    d.className="step"+(sel===s.id?" sel":"")+(status[s.id]==="pass"?" done":status[s.id]==="fail"?" fail":"");
    d.onclick=()=>select(s.id);
    let ico=ICON[status[s.id]||"idle"];
    if(s.kind==="concept")ico="📖";
    d.innerHTML=`<span class="ico">${ico}</span><span class="t">${s.title}</span>`;
    el.appendChild(d);
  });
  const runnable=STEPS.filter(s=>s.kind==="run");
  const done=runnable.filter(s=>status[s.id]==="pass").length;
  document.getElementById("bar").style.width=(runnable.length?100*done/runnable.length:0)+"%";
}

function select(id){ sel=id; renderSide(); renderContent(); }

function lvClass(l){ if(!l)return "all"; if(l.startsWith("begin"))return "beginner";
  if(l.startsWith("inter"))return "intermediate"; if(l.startsWith("adv"))return "advanced"; return "all"; }

const DIAGRAM=`<div class="loopdiag">
  <span class="node s">RECEIVE PROMPT</span><span class="arrow">→</span>
  <span class="node r">REASON / PLAN</span><span class="arrow">→</span>
  <span class="node a">ACT (tool)</span><span class="arrow">→</span>
  <span class="node o">OBSERVE result</span><span class="arrow">↺</span>
  <span class="loopback">repeat until done</span><span class="arrow">→</span>
  <span class="node f">FINAL RESULT</span>
</div>`;

function renderContent(){
  const s=STEPS.find(x=>x.id===sel); const c=document.getElementById("content");
  if(!s){ c.innerHTML='<p class="desc">Select a step on the left.</p>'; return; }
  const lv=`<span class="lv ${lvClass(s.level)}">${s.level||""}</span>`;
  const diagram=(s.id==="intro")?DIAGRAM:"";
  let src="";
  if(s.kind==="run"){
    src=`<div class="srcwrap">
      <div class="srctog" onclick="toggleSrc('${s.id}')"><span id="srcarrow-${s.id}">▸</span> View demo source — demos/${s.demo}</div>
      <pre class="src" id="src-${s.id}">${srcCache[s.id]?esc(srcCache[s.id]):"loading…"}</pre></div>`;
  }
  let action="";
  if(s.kind==="run"){
    const dis=CLI?"":"disabled";
    const note=CLI?'<span class="note">▶ runs a REAL agent loop — uses your Claude sign-in, costs a few cents</span>'
                  :'<span class="note">⚠ `claude` CLI not found — install & sign in to run live</span>';
    action=`<button class="run" id="runbtn" ${dis} onclick="runStep('${s.id}')">▶ Run this loop live</button>${note}`;
  }
  const showTerm=(s.kind==="run");
  c.innerHTML=`<div class="crumb">${s.group}</div><h2>${s.title} ${lv}</h2>
    ${diagram}
    <div class="desc">${esc(s.desc||"")}</div>
    ${src}
    <div class="actions">${action}</div>
    ${showTerm?`<div class="term-wrap"><div class="term-bar">
      <span class="d" style="background:#f85149"></span><span class="d" style="background:#d29922"></span>
      <span class="d" style="background:#3fb950"></span><span style="margin-left:8px">live agent loop</span>
      <span class="clr" onclick="clearTerm()">clear</span></div>
      <div class="term" id="term">${termCache[s.id]||'<span style="color:#586069">— click “Run this loop live” to watch REASON → ACT → OBSERVE → RESULT —</span>'}</div>
      <div class="footer" id="footer"></div></div>`:""}
    <div class="hintbar">${s.kind==="run"
      ? 'Output streams live. Colours: <span class="l-session">session</span> · <span class="l-think">reasoning</span> · <span class="l-act">ACT (tool call = one turn)</span> · <span class="l-observe">OBSERVE (tool result)</span> · <span class="l-result">result</span>.'
      : 'This is a concept step — read it, then move to the next runnable part.'}</div>`;
  if(s.kind==="run"&&!srcCache[s.id])loadSrc(s.id);
}

async function loadSrc(id){
  try{ const r=await jget("/api/source/"+id); srcCache[id]=r.source||""; }
  catch{ srcCache[id]="(could not load source)"; }
  const el=document.getElementById("src-"+id); if(el)el.textContent=srcCache[id];
}
function toggleSrc(id){ const el=document.getElementById("src-"+id),a=document.getElementById("srcarrow-"+id);
  if(!el)return; el.classList.toggle("open"); if(a)a.textContent=el.classList.contains("open")?"▾":"▸"; }

function clearTerm(){ if(sel)termCache[sel]=""; const t=document.getElementById("term"); if(t)t.innerHTML="";
  const f=document.getElementById("footer"); if(f)f.classList.remove("show"); }
function writeTerm(html){ const t=document.getElementById("term"); if(!t)return; t.innerHTML=html; t.scrollTop=t.scrollHeight; }

async function runStep(id){
  status[id]="running"; renderSide();
  const btn=document.getElementById("runbtn"); if(btn)btn.disabled=true;
  const f=document.getElementById("footer"); if(f)f.classList.remove("show");
  let text=""; termCache[id]="";
  try{
    const resp=await fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({step_id:id})});
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let code=null,dur=null;
    while(true){ const {done,value}=await reader.read(); if(done)break;
      text+=dec.decode(value,{stream:true});
      const m=text.indexOf("__EXIT__"); let disp=m>=0?text.slice(0,m):text;
      if(m>=0){ const r=text.slice(m).match(/__EXIT__ (\-?\d+) ([\d.]+)/); if(r){code=parseInt(r[1]);dur=r[2];} }
      termCache[id]=colorize(disp); if(sel===id)writeTerm(termCache[id]);
    }
    if(code!==null){ status[id]=code===0?"pass":"fail";
      if(sel===id&&f){ f.classList.add("show");
        f.innerHTML=code===0?`<span class="pass">✓ loop completed (exit 0)</span> · ${dur}s`
                            :`<span class="failc">✕ exit ${code}</span> · ${dur}s — see output above`; }
    } else status[id]="pass";
  }catch(e){ status[id]="fail"; termCache[id]=esc("client error: "+e.message); if(sel===id)writeTerm(termCache[id]); }
  if(btn)btn.disabled=false;
  renderSide(); if(sel===id)renderContent();
  if(sel===id&&termCache[id])writeTerm(termCache[id]);
}

async function cleanFiles(){ const r=await jpost("/api/cleanup",{}); alert((r.messages||["cleaned"]).join("\n")); }

async function boot(){
  const r=await jget("/api/steps"); STEPS=r.steps; CLI=r.cli_ready;
  STEPS.forEach(s=>status[s.id]="idle");
  const p=document.getElementById("pill-cli");
  p.classList.toggle("up",CLI); p.classList.toggle("down",!CLI);
  document.getElementById("cli-txt").textContent=CLI?"claude CLI ready · live":"claude CLI missing";
  sel=STEPS[0].id; renderSide(); renderContent();
}
boot();
</script>
</body>
</html>
